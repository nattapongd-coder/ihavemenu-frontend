<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กรอกวัตถุดิบ - IhaveMenu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .bg-food {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.6)), 
                              url('https://images.unsplash.com/photo-1498837167922-ddd27525d352?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="bg-food min-h-screen">
    <div class="min-h-screen flex items-center justify-center px-4 py-8">
        <div class="max-w-3xl w-full">
            <a href="/" class="inline-flex items-center gap-2 text-white hover:text-yellow-400 transition duration-300 mb-6">
                <span class="text-2xl">←</span>
                <span class="text-lg font-semibold">กลับหน้าแรก</span>
            </a>
            
            <div class="text-center mb-8">
                <h1 class="text-5xl md:text-6xl font-bold text-yellow-400 mb-4 drop-shadow-lg">
                    🍳 กรอกวัตถุดิบ
                </h1>
                <p class="text-xl text-white/90">บอกวัตถุดิบที่มี เราจะแนะนำเมนูให้</p>
            </div>
            
            <div class="bg-white/95 backdrop-blur rounded-3xl shadow-2xl p-8 md:p-10">
                <form id="menuForm" class="space-y-8">
                    <div>
                        <label class="block text-gray-800 font-bold mb-4 text-xl flex items-center gap-2">
                            <span class="text-2xl">🥬</span> วัตถุดิบที่มี
                        </label>
                        <div class="space-y-3">
                            <div class="grid grid-cols-1 gap-3">
                                <input type="text" id="ingredientName" placeholder="ชื่อวัตถุดิบ เช่น กุ้ง"
                                       class="w-full px-5 py-4 border-2 border-gray-200 rounded-2xl focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition text-lg">
                                <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                    <input type="number" id="ingredientAmount" placeholder="จำนวน" min="1"
                                           class="px-4 py-4 border-2 border-gray-200 rounded-2xl focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition text-lg">
                                    <select id="ingredientUnit"
                                            class="px-3 py-4 border-2 border-gray-200 rounded-2xl focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition text-lg">
                                        <option value="กรัม">กรัม</option>
                                        <option value="ฟอง">ฟอง</option>
                                        <option value="ช้อนโต๊ะ">ช้อนโต๊ะ</option>
                                        <option value="ถ้วย">ถ้วย</option>
                                        <option value="กิโลกรัม">กิโลกรัม</option>
                                    </select>
                                    <button type="button" id="addIngredient"
                                            class="col-span-2 sm:col-span-1 px-8 py-4 bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white font-bold rounded-2xl transition duration-300 transform hover:scale-105 shadow-lg text-lg">
                                        + เพิ่ม
                                    </button>
                                </div>
                            </div>
                            <div id="ingredientList" class="space-y-2 min-h-[60px]"></div>
                        </div>
                        <input type="hidden" id="ingredients" required>
                    </div>
                    
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-gray-800 font-bold mb-4 text-xl flex items-center gap-2">
                                <span class="text-2xl">🍲</span> ประเภทอาหาร
                            </label>
                            <select id="foodType" required
                                    class="w-full px-5 py-4 border-2 border-gray-200 rounded-2xl focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition text-lg font-medium">
                                <option value="boiled">🥘 ต้ม</option>
                                <option value="stir-fried">🍳 ผัด</option>
                                <option value="curries">🍛 แกง</option>
                                <option value="fried">🍗 ทอด</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-gray-800 font-bold mb-4 text-xl flex items-center gap-2">
                                <span class="text-2xl">⏱️</span> เวลาที่มี (นาที)
                            </label>
                            <input type="number" id="timeLimit" placeholder="30" min="5" max="180" required
                                   class="w-full px-5 py-4 border-2 border-gray-200 rounded-2xl focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition text-lg">
                        </div>
                    </div>
                    
                    <button type="submit" 
                            class="w-full bg-gradient-to-r from-yellow-400 to-orange-500 hover:from-yellow-500 hover:to-orange-600 text-white font-bold py-4 rounded-full text-xl transition duration-300 transform hover:scale-105 shadow-xl">
                        🔍 ค้นหาเมนูแนะนำ
                    </button>
                </form>
                
                <div id="loading" class="hidden text-center mt-8">
                    <div class="inline-block animate-spin rounded-full h-16 w-16 border-4 border-yellow-200 border-t-yellow-500"></div>
                    <p class="text-gray-700 text-xl font-semibold mt-4">กำลังค้นหาเมนูที่เหลือเหมาะ... 🔍</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ingredientsList = [];
        
        document.getElementById('addIngredient').addEventListener('click', () => {
            const name = document.getElementById('ingredientName').value.trim();
            const amount = document.getElementById('ingredientAmount').value;
            const unit = document.getElementById('ingredientUnit').value;
            
            if (name && amount) {
                ingredientsList.push({ name, amount, unit });
                updateIngredientDisplay();
                document.getElementById('ingredientName').value = '';
                document.getElementById('ingredientAmount').value = '';
            }
        });
        
        document.getElementById('ingredientName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('addIngredient').click();
            }
        });
        
        function updateIngredientDisplay() {
            const listDiv = document.getElementById('ingredientList');
            if (ingredientsList.length === 0) {
                listDiv.innerHTML = '<p class="text-gray-400 text-center py-4">ยังไม่มีวัตถุดิบ กรุณาเพิ่มวัตถุดิบ</p>';
            } else {
                listDiv.innerHTML = '<div class="flex flex-wrap gap-2">' + ingredientsList.map((item, index) => `
                    <div class="inline-flex items-center gap-2 bg-gradient-to-r from-yellow-100 to-orange-100 px-4 py-2 rounded-full border-2 border-yellow-300 shadow-sm">
                        <span class="text-gray-800 font-medium">${item.name} - ${item.amount} ${item.unit}</span>
                        <button type="button" onclick="removeIngredient(${index})" class="text-red-500 hover:text-red-700 transition font-bold text-lg">×</button>
                    </div>
                `).join('') + '</div>';
            }
            
            document.getElementById('ingredients').value = ingredientsList.map(i => i.name).join(', ');
        }
        
        function removeIngredient(index) {
            ingredientsList.splice(index, 1);
            updateIngredientDisplay();
        }
        
        updateIngredientDisplay();
        
        document.getElementById('menuForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (ingredientsList.length === 0) {
                alert('กรุณาเพิ่มวัตถุดิบอย่างน้อย 1 รายการ');
                return;
            }
            
            const ingredients = document.getElementById('ingredients').value;
            const foodType = document.getElementById('foodType').value;
            const timeLimit = document.getElementById('timeLimit').value;
            
            document.getElementById('loading').classList.remove('hidden');
            
            try {
                // เรียก Frontend's proxy endpoint แทน recipe-service directly
                const response = await fetch('/api/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ingredients, food_type: foodType, time_limit: timeLimit })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    sessionStorage.setItem('recipesData', JSON.stringify(data));
                    window.location.href = '/result';
                } else {
                    alert('เกิดข้อผิดพลาด: ' + (data.msg || data.error || 'Unknown error'));
                    document.getElementById('loading').classList.add('hidden');
                }
            } catch (error) {
                alert('ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์: ' + error.message);
                document.getElementById('loading').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
