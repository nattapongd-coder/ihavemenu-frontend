<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IhaveMenu - ระบบช่วยคิดเมนูอาหารอัจฉริยะ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; overflow-x: hidden; }
        
        .bg-food {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.5)), 
                            url('https://images.unsplash.com/photo-1498837167922-ddd27525d352?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* ปรับขนาด Fluid Typography ให้เล็กลงและดูพอดีขึ้น */
        .fluid-h1 {
            font-size: clamp(2.2rem, 8vw, 4.5rem); /* ลดจากเดิมที่สูงสุด 8rem เหลือ 4.5rem */
        }
        
        .text-glow {
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        @keyframes revealUp {
            0% { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .animate-reveal { opacity: 0; animation: revealUp 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
    </style>
</head>
<body class="bg-black">

    <div class="bg-food min-h-screen flex items-center justify-center p-6 md:p-8">
        <div class="max-w-5xl w-full text-center">
            
            <h1 class="animate-reveal fluid-h1 font-extrabold mb-4 md:mb-6 tracking-tighter text-yellow-400 drop-shadow-xl text-glow leading-tight">
                IhaveMenu <span class="inline-block animate-bounce text-[0.8em]">🍳</span>
            </h1>
            
            <div class="animate-reveal delay-1 inline-block w-full max-w-3xl px-6 py-6 md:px-10 md:py-8 rounded-3xl backdrop-blur-sm bg-black/30 mb-8 border border-white/20 shadow-xl">
                <p class="text-lg sm:text-xl md:text-2xl text-white leading-relaxed font-light">
                    เปลี่ยนวัตถุดิบในตู้เย็นให้เป็นเมนูสุดพิเศษ <br class="hidden sm:block">
                    ด้วยระบบช่วยคิดเมนูอาหารอัจฉริยะ <br class="sm:hidden">
                    <span class="font-semibold text-yellow-400 border-b-2 border-yellow-400/30">จากวัตถุดิบที่คุณมี</span>
                </p>
            </div>
            
            <div class="animate-reveal delay-2 flex justify-center mb-12 md:mb-16">
                <a href="/user-input" 
                   class="group relative bg-gradient-to-r from-yellow-400 to-orange-500 text-white font-bold py-3 px-10 md:py-4 md:px-14 rounded-full text-lg md:text-xl transition-all duration-300 transform hover:scale-105 active:scale-95 shadow-lg flex items-center gap-2">
                    มาเริ่มกันเลย 
                    <span class="transition-transform duration-300 group-hover:rotate-12">👨‍🍳</span>
                </a>
            </div>

            <div class="animate-reveal delay-3 grid grid-cols-1 sm:grid-cols-3 gap-4 max-w-4xl mx-auto text-white">
                <div class="flex flex-row sm:flex-col items-center justify-center gap-3 sm:gap-1 group bg-white/5 p-4 rounded-2xl backdrop-blur-sm border border-white/30 hover:bg-white/15 transition-all">
                    <div class="text-3xl sm:text-4xl sm:mb-2 transition-transform duration-500 group-hover:scale-110">🥦</div>
                    <p class="text-sm sm:text-base font-medium group-hover:text-yellow-300">เลือกวัตถุดิบได้เอง</p>
                </div>
                
                <div class="flex flex-row sm:flex-col items-center justify-center gap-3 sm:gap-1 group bg-white/5 p-4 rounded-2xl backdrop-blur-sm border border-white/30 hover:bg-white/15 transition-all">
                    <div class="text-3xl sm:text-4xl sm:mb-2 transition-transform duration-500 group-hover:scale-110">💡</div>
                    <p class="text-sm sm:text-base font-medium group-hover:text-yellow-300">แนะนำแม่นยำ</p>
                </div>

                <div class="flex flex-row sm:flex-col items-center justify-center gap-3 sm:gap-1 group bg-white/5 p-4 rounded-2xl backdrop-blur-sm border border-white/30 hover:bg-white/15 transition-all">
                    <div class="text-3xl sm:text-4xl sm:mb-2 transition-transform duration-500 group-hover:scale-110">✨</div>
                    <p class="text-sm sm:text-base font-medium group-hover:text-yellow-300">ประหยัดเวลา</p>
                </div>
            </div>
            
        </div>
    </div>

</body>
</html>
